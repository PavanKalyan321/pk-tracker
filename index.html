let deferredPrompt=null;

// ─── Load / Save (localStorage) ───────────────────────────────────────────────
function ld(){
  try{M=JSON.parse(localStorage.getItem(SK.m))||[];}catch{M=[];}
  try{P=JSON.parse(localStorage.getItem(SK.p))||[];}catch{P=[];}
  try{L=JSON.parse(localStorage.getItem(SK.l))||[];}catch{L=[];}
  try{logs=JSON.parse(localStorage.getItem(SK.g))||[];}catch{logs=[];}
  try{expenses=JSON.parse(localStorage.getItem(SK.e))||[];}catch{expenses=[];}
  try{customExpCats=JSON.parse(localStorage.getItem(SK.ec))||[];}catch{customExpCats=[];}
  if(!M.length){M=structuredClone(DM);P=structuredClone(DP);L=structuredClone(DL);}
  L.forEach(l=>{if(!l.history)l.history=[];if(l.deposit===undefined)l.deposit=0;if(!l.currency)l.currency='INR';if(!l.withdrawals)l.withdrawals=[];if(!l.transfers)l.transfers=[];if(!l.losses)l.losses=[];});
}

function sv(){
  try{
    localStorage.setItem(SK.m,JSON.stringify(M));
    localStorage.setItem(SK.p,JSON.stringify(P));
    localStorage.setItem(SK.l,JSON.stringify(L));
    localStorage.setItem(SK.e,JSON.stringify(expenses));
    localStorage.setItem(SK.ec,JSON.stringify(customExpCats));
  }catch(e){console.warn('localStorage save failed:',e);}
}

function lg(m){
  const entry={time:new Date().toISOString(),msg:m};
  logs.push(entry);
  try{localStorage.setItem(SK.g,JSON.stringify(logs.slice(-300)));}catch(e){}
}

// ─── Formatting ───────────────────────────────────────────────────────────────
function fmt(n,c){const a=Math.abs(n);if(c==="USDT"||c==="USD")return"$"+a.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});if(c==="SOL"||c==="ETH"||c==="BTC")return a.toLocaleString("en-US",{minimumFractionDigits:4,maximumFractionDigits:4})+" "+c;return"₹"+a.toLocaleString("en-IN")}
function fB(l){return fmt(l.balance,l.currency)}
function fS(n,c){return(n>=0?"+":"-")+fmt(Math.abs(n),c)}
function fD(i){return i?new Date(i).toLocaleDateString("en-IN",{day:"numeric",month:"short"}):"—"}
function fT(i){return new Date(i).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}
function toast(m){clearTimeout(toastT);let t=document.getElementById("toast");if(t)t.remove();t=document.createElement("div");t.id="toast";t.className="toast";t.textContent=m;document.body.appendChild(t);toastT=setTimeout(()=>t.remove(),2200)}
function gid(pfx,ex){let n=1;while(ex.some(e=>e.id===pfx+String(n).padStart(3,"0")))n++;return pfx+String(n).padStart(3,"0")}
function gM(id){return M.find(m=>m.id===id)}
function gP(id){return P.find(p=>p.id===id)}

function gFilt(){
  let r=L;
  if(aM!=="all")r=r.filter(l=>l.module===aM);
  if(srch){const s=srch.toLowerCase();r=r.filter(l=>l.id.toLowerCase().includes(s)||l.platform.toLowerCase().includes(s)||l.notes.toLowerCase().includes(s)||l.currency.toLowerCase().includes(s))}
  if(filt!=="all")r=r.filter(l=>l.status===filt);
  return r;
}
function gWD(l){return(l.withdrawals||[]).reduce((s,w)=>s+w.amt,0)}
function gPnL(l){return l.balance+gWD(l)-l.deposit}
function getPeriodWd(currency,period){const d=new Date();let cut=0;if(period==='day')cut=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();else if(period==='week'){const dy=d.getDay();cut=new Date(d.getFullYear(),d.getMonth(),d.getDate()-dy).getTime();}else if(period==='month')cut=new Date(d.getFullYear(),d.getMonth(),1).getTime();return L.filter(l=>(l.currency||'INR')===currency).reduce((s,l)=>s+(l.withdrawals||[]).filter(w=>w.ts>=cut).reduce((ss,w)=>ss+w.amt,0),0)}
function sPeriod(p){dashP=p;R()}
function curBk(ls){const b={};ls.forEach(l=>{const c=l.currency||"INR";if(!b[c])b[c]={bal:0,dep:0,wd:0};b[c].bal+=l.balance;b[c].dep+=l.deposit;b[c].wd+=gWD(l)});return Object.keys(b).sort((a,x)=>a==="INR"?-1:x==="INR"?1:a.localeCompare(x)).map(c=>({cur:c,...b[c],pnl:b[c].bal+b[c].wd-b[c].dep}))}
function grp(ls){const g={};ls.forEach(l=>{if(!g[l.platform])g[l.platform]=[];g[l.platform].push(l)});return g}
function spk(h,c){if(!h||h.length<2)return"";const v=h.slice(-12).map(x=>x.bal),mx=Math.max(...v,1);return`<div class="line-mini-spark">${v.map((x,i)=>`<div class="mini-bar" style="height:${Math.max(2,(x/mx)*18)}px;background:${c};opacity:${i===v.length-1?.9:.25+(i/v.length)*.35}"></div>`).join("")}</div>`}
function stB(l){const s=SC[l.status];return`<button onclick="event.stopPropagation();cyc('${l.id}')" class="status-badge ${s.p?'pulse':''}" style="background:${s.c}15;border-color:${s.c}40;color:${s.c}">${s.l}</button>`}

// ─── Actions ──────────────────────────────────────────────────────────────────
function cyc(id){const l=L.find(x=>x.id===id);if(!l)return;const o=l.status;l.status=STS[(STS.indexOf(o)+1)%STS.length];if(l.status==="active")l.lastActive=new Date().toISOString();navigator.vibrate?.([20]);lg(`${id} → ${SC[l.status].l}`);sv();R()}
function qf(id,a){const l=L.find(x=>x.id===id);if(!l)return;l.balance+=a;l.deposit+=a;l.history.push({bal:l.balance,ts:Date.now()});if(l.status==="initialized")l.status="funded";navigator.vibrate?.([15,30,15]);lg(`${id} +${fmt(a,l.currency)}`);sv();R();toast(`${id} funded`)}
function oFund(id){modal={t:"fund",id};R();setTimeout(()=>document.getElementById("fund-amt")?.focus(),60)}
function sFundQ(id,a){modal=null;qf(id,a);}
function sFund(){const l=L.find(x=>x.id===modal.id);if(!l)return;const a=parseFloat(document.getElementById("fund-amt").value);if(!a||a<=0)return toast("Enter valid amount");const id=l.id;modal=null;qf(id,a);}

function oAM(){modal={t:"am",name:"",icon:"💰",color:"#A78BFA",desc:""};R();setTimeout(()=>document.getElementById("m-name")?.focus(),60)}
function sAM(){const n=document.getElementById("m-name").value.trim();if(!n)return toast("Name required");const id=n.toLowerCase().replace(/[^a-z0-9]/g,"-");if(M.some(m=>m.id===id))return toast("Exists");M.push({id,name:n,icon:modal.icon,color:modal.color,desc:document.getElementById("m-desc").value.trim()});lg(`Module: ${n}`);modal=null;sv();R();toast(`${n} added`)}
function dM(id){const m=gM(id);if(!m||!confirm(`Delete "${m.name}" + all its platforms & lines?`))return;L=L.filter(l=>l.module!==id);P=P.filter(p=>p.module!==id);M=M.filter(x=>x.id!==id);if(aM===id)aM="all";lg(`Deleted module: ${m.name}`);sv();R();toast(`${m.name} deleted`)}

function oAP(mid){const mod=mid||aM;if(mod==="all"){modal={t:"pm"};R();return}modal={t:"ap",module:mod,name:"",icon:"⭐",color:gM(mod)?.color||"#4C9EFF"};R();setTimeout(()=>document.getElementById("p-name")?.focus(),60)}
function sAP(){const n=document.getElementById("p-name").value.trim();if(!n)return toast("Name required");if(P.some(p=>p.id===n&&p.module===modal.module))return toast("Exists");P.push({id:n,module:modal.module,icon:modal.icon,color:modal.color});lg(`Platform: ${n} → ${modal.module}`);modal=null;sv();R();toast(`${n} added`)}
function dP(pid,mod){if(!confirm(`Delete "${pid}" + all lines?`))return;L=L.filter(l=>!(l.platform===pid&&l.module===mod));P=P.filter(p=>!(p.id===pid&&p.module===mod));lg(`Deleted: ${pid}`);sv();R();toast(`${pid} deleted`)}

function oAL(pid,mid){const pfx=pid.replace(/[^A-Za-z]/g,"").substring(0,3).toUpperCase();modal={t:"al",platform:pid,module:mid,id:gid(pfx+"-",L),currency:mid==="crypto"?"USDT":"INR",notes:""};R();setTimeout(()=>document.getElementById("l-id")?.focus(),60)}
function sAL(){const id=document.getElementById("l-id").value.trim();if(!id)return toast("ID required");if(L.some(l=>l.id===id))return toast("ID exists");const ln=L.filter(l=>l.platform===modal.platform&&l.module===modal.module).length+1;L.push({id,platform:modal.platform,module:modal.module,label:`Line ${ln}`,status:"initialized",balance:0,deposit:0,currency:document.getElementById("l-cur").value,lastActive:null,notes:document.getElementById("l-notes").value.trim(),history:[],withdrawals:[],transfers:[],losses:[]});lg(`Line: ${id} → ${modal.platform}`);modal=null;sv();R();toast(`${id} added`)}
function dL(id){if(!confirm(`Delete ${id}?`))return;L=L.filter(l=>l.id!==id);lg(`Deleted: ${id}`);sv();R();toast(`${id} deleted`)}

function oEL(id){modal={t:"el",id};R();setTimeout(()=>document.getElementById("eb")?.focus(),60)}
function sEL(){const l=L.find(x=>x.id===modal.id);l.balance=parseFloat(document.getElementById("eb").value)||0;l.deposit=parseFloat(document.getElementById("ed").value)||0;l.currency=document.getElementById("ec").value;l.notes=document.getElementById("en").value;l.history.push({bal:l.balance,ts:Date.now()});lg(`${l.id} → ${fB(l)}`);modal=null;sv();R();toast("Updated")}

function tP(p){col[p]=!col[p];R()}
function tL(){logO=!logO;R()}
function sS(v){srch=v;R()}
function sF(s){filt=s;R()}
function tV(){vw=vw==="grid"?"table":"grid";R()}
function cL(){logs=[];try{localStorage.setItem(SK.g,"[]");}catch{}R();toast("Cleared")}
function sMP(k,v){modal[k]=v;R()}
function cM(){modal=null;R()}

function oWL(id){modal={t:"wl",id};R();setTimeout(()=>document.getElementById("wd-amt")?.focus(),60)}
function sWL(){
  const l=L.find(x=>x.id===modal.id);if(!l)return;
  const a=parseFloat(document.getElementById("wd-amt").value);
  if(!a||a<=0)return toast("Enter a valid amount");
  if(a>l.balance)return toast("Exceeds balance ("+fB(l)+")");
  if(!l.withdrawals)l.withdrawals=[];
  l.withdrawals.push({amt:a,ts:Date.now()});
  l.balance-=a;
  l.history.push({bal:l.balance,ts:Date.now()});
  lg(`${l.id} WD ${fmt(a,l.currency)}`);
  modal=null;sv();R();toast(`Withdrawn ${fmt(a,l.currency)}`);
}

function gLD(l){return(l.losses||[]).reduce((s,w)=>s+w.amt,0)}
function oLoss(id){modal={t:"ls",id};R();setTimeout(()=>document.getElementById("ls-amt")?.focus(),60)}
function sLoss(qa){
  const l=L.find(x=>x.id===modal.id);if(!l)return;
  const a=qa!==undefined?qa:parseFloat(document.getElementById("ls-amt").value);
  if(!a||a<=0)return toast("Enter valid amount");
  if(!l.losses)l.losses=[];
  l.losses.push({amt:a,ts:Date.now()});
  l.balance=Math.max(0,l.balance-a);
  l.history.push({bal:l.balance,ts:Date.now()});
  lg(`${l.id} LOSS ${fmt(a,l.currency)}`);
  modal=null;sv();R();toast(`Loss recorded: ${fmt(a,l.currency)}`);
}

function oPft(id){modal={t:"pft",id};R();setTimeout(()=>document.getElementById("pft-amt")?.focus(),60)}
function sPft(id,a){
  const l=L.find(x=>x.id===id||x.id===modal?.id);if(!l)return;
  if(a===null){a=parseFloat(document.getElementById("pft-amt").value);}
  if(!a||a<=0)return toast("Enter valid amount");
  l.balance+=a;
  l.history.push({bal:l.balance,ts:Date.now()});
  navigator.vibrate?.([15,30,15]);
  lg(`${l.id} PROFIT +${fmt(a,l.currency)}`);
  modal=null;sv();R();toast(`Profit +${fmt(a,l.currency)}`);
}

function oTF(fromId){modal={t:"tf",fromId:fromId||"",toId:""};R();setTimeout(()=>document.getElementById("tf-amt")?.focus(),60)}
function sTF(){
  const fromId=document.getElementById("tf-from").value;
  const toId=document.getElementById("tf-to").value;
  const a=parseFloat(document.getElementById("tf-amt").value);
  const from=L.find(x=>x.id===fromId),to=L.find(x=>x.id===toId);
  if(!from)return toast("Select source line");
  if(!to)return toast("Select destination line");
  if(from.id===to.id)return toast("Same line selected");
  if(!a||a<=0)return toast("Enter valid amount");
  if(a>from.balance)return toast(`Exceeds balance (${fB(from)})`);
  if(!from.transfers)from.transfers=[];if(!to.transfers)to.transfers=[];
  const ts=Date.now();
  from.balance-=a;from.transfers.push({type:"out",amt:a,peer:to.id,ts});from.history.push({bal:from.balance,ts});
  to.balance+=a;to.transfers.push({type:"in",amt:a,peer:from.id,ts});to.history.push({bal:to.balance,ts});
  lg(`TX ${from.id}→${to.id} ${fmt(a,from.currency)}`);
  modal=null;sv();R();toast(`Transferred ${fmt(a,from.currency)}`);
}

function resetAll(){
  if(!confirm("⚠ FULL RESET? This will delete ALL data (modules, platforms, lines, logs)."))return;
  if(confirm("Export a backup copy first?"))exp();
  M=structuredClone(DM);P=structuredClone(DP);L=structuredClone(DL);logs=[];
  sv();R();toast("RESET");
}

function resetLines(){
  if(!confirm("⚠ RESET ALL LINES? This will zero out balances, history, withdrawals, transfers, and losses for every line. Modules and platforms are kept."))return;
  if(confirm("Export a backup copy first?"))exp();
  L.forEach(l=>{l.balance=0;l.deposit=0;l.history=[];l.withdrawals=[];l.transfers=[];l.losses=[];l.lastActive=null;l.status="initialized"});
  logs=[];sv();R();toast("LINES RESET");
}

function exp(){
  const d={modules:M,platforms:P,lines:L,logs,exported:new Date().toISOString(),version:"v4"};
  const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`tfm-v4-${new Date().toISOString().slice(0,10)}.json`;a.click();
  lg("Export");toast("EXPORTED");
}

function imp(){
  const i=document.createElement("input");i.type="file";i.accept=".json";
  i.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.modules)M=d.modules;
        if(d.platforms)P=d.platforms;
        if(d.lines){L=d.lines;L.forEach(l=>{if(!l.history)l.history=[];if(l.deposit===undefined)l.deposit=0;if(!l.currency)l.currency="INR";if(!l.withdrawals)l.withdrawals=[];if(!l.transfers)l.transfers=[]})}
        if(d.logs)logs=d.logs;
        sv();lg("Import");R();toast("IMPORTED");
      }catch{toast("Error")}
    };
    r.readAsText(f);
  };
  i.click();
}

function uC(){

  e2.textContent=n.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
}

    if(modal.t==="pft"){const l=L.find(x=>x.id===modal.id);const net=gPnL(l);const pftAmts=[100,200,500,1000,1500,2000];h+=`<div class="modal-title"><div class="modal-title-dot" style="background:var(--green)"></div>RECORD PROFIT → ${l.id}</div><div class="wd-info-grid"><div class="wd-info-cell"><div class="wd-info-label">BALANCE</div><div class="wd-info-val">${fB(l)}</div></div><div class="wd-info-cell"><div class="wd-info-label">P&amp;L</div><div class="wd-info-val" style="color:${net>=0?'var(--green)':'var(--red)'}">${l.deposit>0?fS(net,l.currency):'—'}</div></div></div><div class="modal-field"><label class="modal-label">Quick Amount</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px">${pftAmts.map(a=>`<button class="qf-btn" style="color:var(--green);border-color:rgba(0,230,138,.3);padding:8px 14px;font-size:10px" onclick="sPft('${l.id}',${a})">${a>=1000?(a/1000)+'K':a}</button>`).join('')}</div></div><div class="modal-field"><label class="modal-label">Custom Amount</label><input type="number" id="pft-amt" class="modal-input" placeholder="0" step="any" onkeydown="if(event.key==='Enter')sPft('${l.id}',null)"></div><div class="modal-hint" style="margin-top:-10px;margin-bottom:14px;color:var(--green)">Balance increases · P&amp;L improves</div><div class="modal-actions"><button class="btn" style="background:var(--green);border-color:var(--green);color:#000;font-weight:700" onclick="sPft('${l.id}',null)">RECORD PROFIT</button><button class="btn" onclick="cM()">CANCEL</button></div>`}
    if(modal.t==="fund"){const l=L.find(x=>x.id===modal.id);h+=`<div class="modal-title"><div class="modal-title-dot" style="background:var(--blue)"></div>FUND → ${l.id}</div><div class="wd-info-grid"><div class="wd-info-cell"><div class="wd-info-label">BALANCE</div><div class="wd-info-val">${fB(l)}</div></div><div class="wd-info-cell"><div class="wd-info-label">DEPOSITED</div><div class="wd-info-val" style="color:var(--text3)">${l.deposit>0?fmt(l.deposit,l.currency):'—'}</div></div></div><div class="modal-field"><label class="modal-label">Quick Amount</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px">${QA.map(a=>`<button class="qf-btn" style="color:var(--blue);border-color:rgba(76,158,255,.3);padding:8px 14px;font-size:10px" onclick="sFundQ('${l.id}',${a})">${a>=1000?(a/1000)+'K':a}</button>`).join('')}</div></div><div class="modal-field"><label class="modal-label">Custom Amount</label><input type="number" id="fund-amt" class="modal-input" placeholder="0" step="any" onkeydown="if(event.key==='Enter')sFund()"></div><div class="modal-hint" style="margin-top:-10px;margin-bottom:14px">Adds to balance &amp; deposit</div><div class="modal-actions"><button class="btn" style="background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700" onclick="sFund()">FUND LINE</button><button class="btn" onclick="cM()">CANCEL</button></div>`}
    if(modal.t==="ls"){const l=L.find(x=>x.id===modal.id),pl=gP(l.platform);const ls=l.losses||[];const tot=gLD(l);const net=gPnL(l);const lossAmts=[100,200,500,1000,1500,2000];h+=`<div class="modal-title"><div class="modal-title-dot" style="background:var(--red)"></div>RECORD LOSS → ${l.id}</div><div class="wd-info-grid"><div class="wd-info-cell"><div class="wd-info-label">BALANCE</div><div class="wd-info-val">${fB(l)}</div></div><div class="wd-info-cell"><div class="wd-info-label">P&amp;L</div><div class="wd-info-val" style="color:${net>=0?'var(--green)':'var(--red)'}">${l.deposit>0?fS(net,l.currency):'—'}</div></div>${tot>0?`<div class="wd-info-cell"><div class="wd-info-label">TOTAL LOST</div><div class="wd-info-val" style="color:var(--red)">${fmt(tot,l.currency)}</div></div><div class="wd-info-cell"><div class="wd-info-label">LOSS COUNT</div><div class="wd-info-val">${ls.length}×</div></div>`:''}</div><div class="modal-field"><label class="modal-label">Quick Amount</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px">${lossAmts.map(a=>`<button class="qf-btn" style="color:var(--red);border-color:rgba(255,92,92,.3);padding:8px 14px;font-size:10px" onclick="sLoss(${a})">${a>=1000?(a/1000)+'K':a}</button>`).join('')}</div></div><div class="modal-field"><label class="modal-label">Custom Loss Amount</label><input type="number" id="ls-amt" class="modal-input" placeholder="0" step="any" onkeydown="if(event.key==='Enter')sLoss()"></div><div class="modal-hint" style="margin-top:-10px;margin-bottom:14px;color:var(--red)">Balance will decrease by this amount</div><div class="modal-actions"><button class="btn" style="background:var(--red);border-color:var(--red);color:#fff;font-weight:700" onclick="sLoss()">RECORD LOSS</button><button class="btn" onclick="cM()">CANCEL</button></div>`}
    if(modal.t==="sv"){const l=L.find(x=>x.id===modal.id),pl=gP(l.platform),mc=gM(l.module);const wds=l.withdrawals||[];const tfs=l.transfers||[];const ls=l.losses||[];const totWd=wds.reduce((s,w)=>s+w.amt,0);const totLoss=gLD(l);const net=gPnL(l);const tIn=tfs.filter(t=>t.type==='in').reduce((s,t)=>s+t.amt,0);const tOut=tfs.filter(t=>t.type==='out').reduce((s,t)=>s+t.amt,0);const evts=[];wds.forEach(w=>evts.push({ts:w.ts,tag:'WD',color:'var(--amber)',amt:w.amt,note:''}));tfs.forEach(t=>evts.push({ts:t.ts,tag:t.type.toUpperCase(),color:t.type==='in'?'var(--green)':'var(--blue)',amt:t.amt,note:t.peer}));ls.forEach(w=>evts.push({ts:w.ts,tag:'LOSS',color:'var(--red)',amt:-w.amt,note:''}));evts.sort((a,b)=>b.ts-a.ts);h+=`<div class="modal-title"><div class="modal-title-dot" style="background:${pl?.color||'#888'}"></div>SESSION · ${l.id}</div><div style="font-size:8px;color:var(--text4);margin-bottom:12px">${l.platform} · <span style="color:${mc?.color||'#888'}">${mc?.name||l.module}</span> · ${l.currency}</div><div class="wd-info-grid" style="grid-template-columns:repeat(3,1fr)"><div class="wd-info-cell"><div class="wd-info-label">BALANCE</div><div class="wd-info-val">${fB(l)}</div></div><div class="wd-info-cell"><div class="wd-info-label">DEPOSIT</div><div class="wd-info-val" style="color:var(--text3)">${l.deposit>0?fmt(l.deposit,l.currency):'—'}</div></div><div class="wd-info-cell"><div class="wd-info-label">P&amp;L</div><div class="wd-info-val" style="color:${net>=0?'var(--green)':'var(--red)'}">${l.deposit>0?fS(net,l.currency):'—'}</div></div>${totWd>0?`<div class="wd-info-cell"><div class="wd-info-label">WITHDRAWN</div><div class="wd-info-val" style="color:var(--amber)">${fmt(totWd,l.currency)}</div></div>`:''}${totLoss>0?`<div class="wd-info-cell"><div class="wd-info-label">LOST</div><div class="wd-info-val" style="color:var(--red)">${fmt(totLoss,l.currency)}</div></div>`:''}${tIn>0||tOut>0?`<div class="wd-info-cell"><div class="wd-info-label">TRANSFERS</div><div class="wd-info-val" style="color:var(--blue)">↓${fmt(tIn,l.currency)} ↑${fmt(tOut,l.currency)}</div></div>`:''}${l.history&&l.history.length>1?`<div class="wd-info-cell"><div class="wd-info-label">SNAPSHOTS</div><div class="wd-info-val">${l.history.length}×</div></div>`:''}</div>${evts.length?`<div class="dash-sep" style="margin:10px 0 6px">ALL TRANSACTIONS (${evts.length})</div><div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:2px">${evts.map(ev=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface3);border-radius:5px;border-left:2px solid ${ev.color}"><span style="font-size:7px;font-weight:700;color:${ev.color};min-width:30px;letter-spacing:1px">${ev.tag}</span><div style="flex:1;font-size:9px;color:var(--text4)">${ev.note?ev.note:fD(ev.ts)}</div>${ev.note?`<span style="font-size:8px;color:var(--text4)">${fD(ev.ts)}</span>`:''}<span style="font-family:'Oxanium',sans-serif;font-size:11px;font-weight:600;color:${ev.color}">${ev.amt>=0?'':'-'}${fmt(Math.abs(ev.amt),l.currency)}</span></div>`).join('')}</div>`:'<div style="color:var(--text4);font-size:11px;text-align:center;padding:16px 0">No transactions yet</div>'}${l.history&&l.history.length>1?`<div class="dash-sep" style="margin:10px 0 6px">BALANCE HISTORY</div><div style="max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:2px">${l.history.slice().reverse().map(h=>`<div style="display:flex;justify-content:space-between;padding:5px 8px;background:var(--surface3);border-radius:4px"><span style="font-size:8px;color:var(--text4)">${fD(h.ts)}</span><span style="font-family:'Oxanium',sans-serif;font-size:10px;color:var(--text)">${fmt(h.bal,l.currency)}</span></div>`).join('')}</div>`:''}<div class="modal-actions" style="margin-top:14px"><button class="btn" onclick="cM()">CLOSE</button></div>`}
    if(modal.t==="exp"){const allCats=getAllCats();const cat=allCats.find(c=>c.id===modal.cat)||allCats[0];const monthExp=gExpMonth();const catTotal=monthExp.filter(e=>e.cat===modal.cat).reduce((s,e)=>s+e.amt,0);h+=`<div class="modal-title"><div class="modal-title-dot" style="background:${cat.color}"></div>ADD EXPENSE</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px">${allCats.map(c=>`<button onclick="sMP('cat','${c.id}')" style="font-family:inherit;padding:7px 11px;border-radius:5px;border:1px solid ${modal.cat===c.id?c.color:'var(--border)'};background:${modal.cat===c.id?c.color+'18':'var(--surface3)'};color:${modal.cat===c.id?c.color:'var(--text3)'};cursor:pointer;font-size:10px;-webkit-tap-highlight-color:transparent;transition:all .15s">${c.icon} ${c.name}</button>`).join('')}</div>${catTotal>0?`<div style="font-size:9px;color:var(--text3);margin-bottom:10px;padding:6px 10px;background:var(--surface3);border-radius:5px">${cat.icon} ${cat.name} this month: <span style="color:${cat.color}">${fmt(catTotal,'INR')}</span></div>`:''}<div class="modal-field"><label class="modal-label">Quick Amount</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px">${EXP_QA.map(a=>`<button class="qf-btn" style="color:${cat.color};border-color:${cat.color}44;padding:8px 14px;font-size:10px" onclick="sAddExp(${a})">${a>=1000?(a/1000)+'K':a}</button>`).join('')}</div></div><div class="modal-field"><label class="modal-label">Custom Amount</label><input type="number" id="exp-amt" class="modal-input" placeholder="0" step="any" onkeydown="if(event.key==='Enter')sAddExp()"></div><div class="modal-field"><label class="modal-label">Note (optional)</label><input id="exp-note" class="modal-input sm" placeholder="What was this for?" onkeydown="if(event.key==='Enter')sAddExp()"></div><div class="modal-actions"><button class="btn" style="background:${cat.color};border-color:${cat.color};color:#000;font-weight:700" onclick="sAddExp()">ADD EXPENSE</button><button class="btn" onclick="cM()">CANCEL</button></div>`}
    if(modal.t==="newcat"){h+=`<div class="modal-title"><div class="modal-title-dot" style="background:${modal.color}"></div>NEW SPEND TYPE</div><div class="modal-field"><label class="modal-label">Name</label><input id="nc-name" class="modal-input" placeholder="e.g. Dining, Gym, Rent..." value="${modal.name}" onkeydown="if(event.key==='Enter')sNewCat()"></div><div class="modal-field"><label class="modal-label">Icon</label><div class="icon-grid">${ICONS.map(i=>`<div class="icon-opt ${modal.icon===i?"sel":""}" onclick="sMP('icon','${i}')">${i}</div>`).join('')}</div></div><div class="modal-field"><label class="modal-label">Color</label><div class="color-grid">${COLORS.map(c=>`<div class="color-opt ${modal.color===c?"sel":""}" style="background:${c}" onclick="sMP('color','${c}')"></div>`).join('')}</div></div><div class="modal-actions"><button class="btn btn-green" onclick="sNewCat()">CREATE TYPE</button><button class="btn" onclick="cM()">CANCEL</button></div>`}
    if(modal.t==="tf"){const fromL=modal.fromId?L.find(x=>x.id===modal.fromId):null;h+=`<div class="modal-title"><div class="modal-title-dot" style="background:var(--blue)"></div>TRANSFER BETWEEN LINES</div><div class="modal-field"><label class="modal-label">From Line</label><select id="tf-from" class="modal-input" onchange="sMP('fromId',this.value)"><option value="">Select source...</option>${L.filter(l=>l.balance>0).map(l=>`<option value="${l.id}" ${modal.fromId===l.id?'selected':''}>${l.id} · ${fB(l)} · ${l.platform}</option>`).join('')}</select></div><div class="modal-field"><label class="modal-label">To Line</label><select id="tf-to" class="modal-input" onchange="sMP('toId',this.value)"><option value="">Select destination...</option>${L.filter(l=>l.id!==modal.fromId).map(l=>`<option value="${l.id}" ${modal.toId===l.id?'selected':''}>${l.id} · ${fB(l)} · ${l.platform}</option>`).join('')}</select></div><div class="modal-field"><label class="modal-label">Amount${fromL?` (Max: ${fB(fromL)})`:''}</label><input type="number" id="tf-amt" class="modal-input" placeholder="0" step="any" onkeydown="if(event.key==='Enter')sTF()"></div><div class="modal-actions"><button class="btn" style="background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700" onclick="sTF()">TRANSFER</button><button class="btn" onclick="cM()">CANCEL</button></div>`}
    h+=`</div></div>`;
  }

  h+=`<div class="bottom-nav"><div class="bottom-nav-inner">
    <button class="bnav-btn ${aM==="__dash__"?"active":""}" onclick="sM('__dash__')"><span class="bnav-icon">🏠</span>DASH</button>
    <button class="bnav-btn ${aM==="all"?"active":""}" onclick="sM('all')"><span class="bnav-icon">📋</span>LINES</button>
    ${M.map(m=>`<button class="bnav-btn ${aM===m.id?"active":""}" onclick="sM('${m.id}')" style="${aM===m.id?'color:'+m.color:''}"><span class="bnav-icon">${m.icon}</span>${m.name.substring(0,5).toUpperCase()}${aM===m.id?`<span style="position:absolute;top:0;left:20%;right:20%;height:2px;background:${m.color};border-radius:0 0 3px 3px;box-shadow:0 0 6px ${m.color}"></span>`:''}</button>`).join("")}
    <button class="bnav-btn ${aM==="__exp__"?"spend-active":""}" onclick="sM('__exp__')"><span class="bnav-icon">💸</span>SPEND</button>
    <button class="bnav-btn" onclick="sMM()"><span class="bnav-icon">⋯</span>MORE</button>
  </div></div>`;

  h+=`<div class="footer"><span>TFM v4.0</span><span>${L.length} LINES · ${P.length} PLATFORMS · ${M.length} MODULES</span></div>`;

  document.getElementById("app").innerHTML=h;
  uC();
}

function sMM(){
  const e=document.createElement("div");e.className="modal-overlay";e.onclick=ev=>{if(ev.target===e)e.remove()};
  e.innerHTML=`<div class="modal"><div class="modal-title">⋯ ACTIONS</div><div style="display:flex;flex-direction:column;gap:6px">
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();oAM()">+ ADD MODULE</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();oAP()">+ ADD PLATFORM</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();tV()">${vw==="grid"?"≡ TABLE":"⊞ GRID"}</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();imp()">↑ IMPORT</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();exp()">↓ EXPORT</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();tL()">📋 LOG</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px;border-color:var(--cyan);color:var(--cyan)" onclick="this.closest('.modal-overlay').remove();sM('__dash__')">🏠 DASHBOARD</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px;border-color:var(--orange);color:var(--orange)" onclick="this.closest('.modal-overlay').remove();sM('__exp__')">💸 EXPENSES</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px;border-color:var(--blue);color:var(--blue)" onclick="this.closest('.modal-overlay').remove();oTF()">⇄ TRANSFER</button>
    ${deferredPrompt?`<button class="btn btn-cyan" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();installApp()">⬇ INSTALL APP</button>`:""}
    ${M.length>4?M.slice(4).map(m=>`<button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();sM('${m.id}')">${m.icon} ${m.name}</button>`).join(""):""}
    <button class="btn" style="width:100%;padding:14px;font-size:12px;border-color:var(--red);color:var(--red)" onclick="this.closest('.modal-overlay').remove();resetLines()">⟳ RESET LINES</button>
    <button class="btn btn-danger" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();resetAll()">⚠ FULL RESET</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px;margin-top:4px" onclick="this.closest('.modal-overlay').remove()">CLOSE</button>
  </div></div>`;
  document.body.appendChild(e);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
ld();R();setInterval(uC,1000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
// Append install button outside #app so R() doesn't remove it
const _ib=document.createElement('button');_ib.id='install-btn';_ib.textContent='⬇ INSTALL';_ib.onclick=installApp;document.body.appendChild(_ib);
</script>
