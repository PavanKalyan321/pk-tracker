// ─── Load / Save (localStorage) ───────────────────────────────────────────────
function ld(){
  try{M=JSON.parse(localStorage.getItem(SK.m))||[];}catch{M=[];}
  try{P=JSON.parse(localStorage.getItem(SK.p))||[];}catch{P=[];}
  try{L=JSON.parse(localStorage.getItem(SK.l))||[];}catch{L=[];}
  try{logs=JSON.parse(localStorage.getItem(SK.g))||[];}catch{logs=[];}
  if(!M.length){M=structuredClone(DM);P=structuredClone(DP);L=structuredClone(DL);}
  L.forEach(l=>{if(!l.history)l.history=[];if(l.deposit===undefined)l.deposit=0;if(!l.currency)l.currency='INR';});
}

function sv(){
  try{
    localStorage.setItem(SK.m,JSON.stringify(M));
    localStorage.setItem(SK.p,JSON.stringify(P));
    localStorage.setItem(SK.l,JSON.stringify(L));
  }catch(e){console.warn('localStorage save failed:',e);}
}

function lg(m){
  const entry={time:new Date().toISOString(),msg:m};
  logs.push(entry);
  try{localStorage.setItem(SK.g,JSON.stringify(logs.slice(-300)));}catch(e){}
}

// ─── Formatting ───────────────────────────────────────────────────────────────
function fmt(n,c){const a=Math.abs(n);if(c==="USDT"||c==="USD")return"$"+a.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});if(c==="SOL"||c==="ETH"||c==="BTC")return a.toLocaleString("en-US",{minimumFractionDigits:4,maximumFractionDigits:4})+" "+c;return"₹"+a.toLocaleString("en-IN")}
function fB(l){return fmt(l.balance,l.currency)}
function fS(n,c){return(n>=0?"+":"-")+fmt(Math.abs(n),c)}
function fD(i){return i?new Date(i).toLocaleDateString("en-IN",{day:"numeric",month:"short"}):"—"}
function fT(i){return new Date(i).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}
function toast(m){clearTimeout(toastT);let t=document.getElementById("toast");if(t)t.remove();t=document.createElement("div");t.id="toast";t.className="toast";t.textContent=m;document.body.appendChild(t);toastT=setTimeout(()=>t.remove(),2200)}
function gid(pfx,ex){let n=1;while(ex.some(e=>e.id===pfx+String(n).padStart(3,"0")))n++;return pfx+String(n).padStart(3,"0")}
function gM(id){return M.find(m=>m.id===id)}
function gP(id){return P.find(p=>p.id===id)}

function gFilt(){
  let r=L;
  if(aM!=="all")r=r.filter(l=>l.module===aM);
  if(srch){const s=srch.toLowerCase();r=r.filter(l=>l.id.toLowerCase().includes(s)||l.platform.toLowerCase().includes(s)||l.notes.toLowerCase().includes(s)||l.currency.toLowerCase().includes(s))}
  if(filt!=="all")r=r.filter(l=>l.status===filt);
  return r;
}
function curBk(ls){const b={};ls.forEach(l=>{const c=l.currency||"INR";if(!b[c])b[c]={bal:0,dep:0};b[c].bal+=l.balance;b[c].dep+=l.deposit});return Object.keys(b).sort((a,x)=>a==="INR"?-1:x==="INR"?1:a.localeCompare(x)).map(c=>({cur:c,...b[c],pnl:b[c].bal-b[c].dep}))}
function grp(ls){const g={};ls.forEach(l=>{if(!g[l.platform])g[l.platform]=[];g[l.platform].push(l)});return g}
function spk(h,c){if(!h||h.length<2)return"";const v=h.slice(-12).map(x=>x.bal),mx=Math.max(...v,1);return`<div class="line-mini-spark">${v.map((x,i)=>`<div class="mini-bar" style="height:${Math.max(2,(x/mx)*18)}px;background:${c};opacity:${i===v.length-1?.9:.25+(i/v.length)*.35}"></div>`).join("")}</div>`}
function stB(l){const s=SC[l.status];return`<button onclick="event.stopPropagation();cyc('${l.id}')" class="status-badge ${s.p?'pulse':''}" style="background:${s.c}15;border-color:${s.c}40;color:${s.c}">${s.l}</button>`}

// ─── Actions ──────────────────────────────────────────────────────────────────
function cyc(id){const l=L.find(x=>x.id===id);if(!l)return;const o=l.status;l.status=STS[(STS.indexOf(o)+1)%STS.length];if(l.status==="active")l.lastActive=new Date().toISOString();lg(`${id} → ${SC[l.status].l}`);sv();R()}
function qf(id,a){const l=L.find(x=>x.id===id);if(!l)return;l.balance+=a;l.deposit+=a;l.history.push({bal:l.balance,ts:Date.now()});if(l.status==="initialized")l.status="funded";lg(`${id} +${fmt(a,l.currency)}`);sv();R();toast(`${id} funded`)}

function oAM(){modal={t:"am",name:"",icon:"💰",color:"#A78BFA",desc:""};R();setTimeout(()=>document.getElementById("m-name")?.focus(),60)}
function sAM(){const n=document.getElementById("m-name").value.trim();if(!n)return toast("Name required");const id=n.toLowerCase().replace(/[^a-z0-9]/g,"-");if(M.some(m=>m.id===id))return toast("Exists");M.push({id,name:n,icon:modal.icon,color:modal.color,desc:document.getElementById("m-desc").value.trim()});lg(`Module: ${n}`);modal=null;sv();R();toast(`${n} added`)}
function dM(id){const m=gM(id);if(!m||!confirm(`Delete "${m.name}" + all its platforms & lines?`))return;L=L.filter(l=>l.module!==id);P=P.filter(p=>p.module!==id);M=M.filter(x=>x.id!==id);if(aM===id)aM="all";lg(`Deleted module: ${m.name}`);sv();R();toast(`${m.name} deleted`)}

function oAP(mid){const mod=mid||aM;if(mod==="all"){modal={t:"pm"};R();return}modal={t:"ap",module:mod,name:"",icon:"⭐",color:gM(mod)?.color||"#4C9EFF"};R();setTimeout(()=>document.getElementById("p-name")?.focus(),60)}
function sAP(){const n=document.getElementById("p-name").value.trim();if(!n)return toast("Name required");if(P.some(p=>p.id===n&&p.module===modal.module))return toast("Exists");P.push({id:n,module:modal.module,icon:modal.icon,color:modal.color});lg(`Platform: ${n} → ${modal.module}`);modal=null;sv();R();toast(`${n} added`)}
function dP(pid,mod){if(!confirm(`Delete "${pid}" + all lines?`))return;L=L.filter(l=>!(l.platform===pid&&l.module===mod));P=P.filter(p=>!(p.id===pid&&p.module===mod));lg(`Deleted: ${pid}`);sv();R();toast(`${pid} deleted`)}

function oAL(pid,mid){const pfx=pid.replace(/[^A-Za-z]/g,"").substring(0,3).toUpperCase();modal={t:"al",platform:pid,module:mid,id:gid(pfx+"-",L),currency:mid==="crypto"?"USDT":"INR",notes:""};R();setTimeout(()=>document.getElementById("l-id")?.focus(),60)}
function sAL(){const id=document.getElementById("l-id").value.trim();if(!id)return toast("ID required");if(L.some(l=>l.id===id))return toast("ID exists");const ln=L.filter(l=>l.platform===modal.platform&&l.module===modal.module).length+1;L.push({id,platform:modal.platform,module:modal.module,label:`Line ${ln}`,status:"initialized",balance:0,deposit:0,currency:document.getElementById("l-cur").value,lastActive:null,notes:document.getElementById("l-notes").value.trim(),history:[]});lg(`Line: ${id} → ${modal.platform}`);modal=null;sv();R();toast(`${id} added`)}
function dL(id){if(!confirm(`Delete ${id}?`))return;L=L.filter(l=>l.id!==id);lg(`Deleted: ${id}`);sv();R();toast(`${id} deleted`)}

function oEL(id){modal={t:"el",id};R();setTimeout(()=>document.getElementById("eb")?.focus(),60)}
function sEL(){const l=L.find(x=>x.id===modal.id);l.balance=parseFloat(document.getElementById("eb").value)||0;l.deposit=parseFloat(document.getElementById("ed").value)||0;l.currency=document.getElementById("ec").value;l.notes=document.getElementById("en").value;l.history.push({bal:l.balance,ts:Date.now()});lg(`${l.id} → ${fB(l)}`);modal=null;sv();R();toast("Updated")}

function sM(m){aM=m;R()}
function tP(p){col[p]=!col[p];R()}
function tL(){logO=!logO;R()}
function sS(v){srch=v;R()}
function sF(s){filt=s;R()}
function tV(){vw=vw==="grid"?"table":"grid";R()}
function cL(){logs=[];try{localStorage.setItem(SK.g,"[]");}catch{}R();toast("Cleared")}
function sMP(k,v){modal[k]=v;R()}
function cM(){modal=null;R()}

function resetAll(){
  if(!confirm("⚠ FULL RESET? This will delete all local data."))return;
  M=structuredClone(DM);P=structuredClone(DP);L=structuredClone(DL);logs=[];
  sv();R();toast("RESET");
}

function exp(){
  const d={modules:M,platforms:P,lines:L,logs,exported:new Date().toISOString(),version:"v4"};
  const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`tfm-v4-${new Date().toISOString().slice(0,10)}.json`;a.click();
  lg("Export");toast("EXPORTED");
}

function imp(){
  const i=document.createElement("input");i.type="file";i.accept=".json";
  i.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.modules)M=d.modules;
        if(d.platforms)P=d.platforms;
        if(d.lines){L=d.lines;L.forEach(l=>{if(!l.history)l.history=[];if(l.deposit===undefined)l.deposit=0;if(!l.currency)l.currency="INR"})}
        if(d.logs)logs=d.logs;
        sv();lg("Import");R();toast("IMPORTED");
      }catch{toast("Error")}
    };
    r.readAsText(f);
  };
  i.click();
}

function uC(){
  const e=document.getElementById("ck-t"),e2=document.getElementById("ck-d");
  if(!e)return;
  const n=new Date();
  e.textContent=n.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
  e2.textContent=n.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
}

  h+=`<div class="search-row">

      <div style="display:flex;gap:4px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();cL()">CLEAR</button>
        <span style="font-size:9px;color:var(--text4);transition:transform .3s;${logO?"transform:rotate(180deg)":""}">▼</span>
      </div>
    </div>
    <div class="log-body ${logO?"":"collapsed"}">
      ${logs.length===0?'<div class="log-empty">No activity</div>':logs.slice().reverse().slice(0,60).map(l=>`<div class="log-entry"><span class="log-time">${fT(l.time)}</span><span class="log-msg">${l.msg}</span></div>`).join("")}
    </div>
  </div>`;

  // Modals
  if(modal){
    h+=`<div class="modal-overlay" onclick="if(event.target===this)cM()"><div class="modal">`;
    if(modal.t==="am")h+=`<div class="modal-title"><div class="modal-title-dot" style="background:${modal.color}"></div>ADD MODULE</div><div class="modal-field"><label class="modal-label">Name</label><input id="m-name" class="modal-input" placeholder="e.g. Mutual Funds, Gold, FD..." value="${modal.name}" onkeydown="if(event.key==='Enter')sAM()"></div><div class="modal-field"><label class="modal-label">Description</label><input id="m-desc" class="modal-input sm" placeholder="Short description..." value="${modal.desc}"></div><div class="modal-field"><label class="modal-label">Icon</label><div class="icon-grid">${ICONS.map(i=>`<div class="icon-opt ${modal.icon===i?"sel":""}" onclick="sMP('icon','${i}')">${i}</div>`).join("")}</div></div><div class="modal-field"><label class="modal-label">Color</label><div class="color-grid">${COLORS.map(c=>`<div class="color-opt ${modal.color===c?"sel":""}" style="background:${c}" onclick="sMP('color','${c}')"></div>`).join("")}</div></div><div class="modal-actions"><button class="btn btn-green" onclick="sAM()">ADD MODULE</button><button class="btn" onclick="cM()">CANCEL</button></div>`;
    if(modal.t==="ap"){const mc=gM(modal.module);h+=`<div class="modal-title"><div class="modal-title-dot" style="background:${mc?.color||"#888"}"></div>ADD PLATFORM → ${mc?.name||modal.module}</div><div class="modal-field"><label class="modal-label">Platform Name</label><input id="p-name" class="modal-input" placeholder="e.g. Zerodha, KuCoin..." value="${modal.name}" onkeydown="if(event.key==='Enter')sAP()"></div><div class="modal-field"><label class="modal-label">Icon</label><div class="icon-grid">${ICONS.map(i=>`<div class="icon-opt ${modal.icon===i?"sel":""}" onclick="sMP('icon','${i}')">${i}</div>`).join("")}</div></div><div class="modal-field"><label class="modal-label">Color</label><div class="color-grid">${COLORS.map(c=>`<div class="color-opt ${modal.color===c?"sel":""}" style="background:${c}" onclick="sMP('color','${c}')"></div>`).join("")}</div></div><div class="modal-actions"><button class="btn btn-green" onclick="sAP()">ADD</button><button class="btn" onclick="cM()">CANCEL</button></div>`}
    if(modal.t==="pm")h+=`<div class="modal-title">SELECT MODULE</div>${M.map(m=>`<div style="padding:14px;margin-bottom:6px;background:var(--surface3);border:1px solid var(--border);border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:10px" onclick="modal={t:'ap',module:'${m.id}',name:'',icon:'⭐',color:'${m.color}'};R()"><span style="font-size:22px">${m.icon}</span><div><div style="font-family:'Oxanium',sans-serif;font-size:12px;font-weight:600;color:${m.color}">${m.name}</div><div style="font-size:9px;color:var(--text4)">${m.desc}</div></div></div>`).join("")}<div class="modal-actions"><button class="btn" onclick="cM()">CANCEL</button></div>`;
    if(modal.t==="al")h+=`<div class="modal-title"><div class="modal-title-dot" style="background:${gP(modal.platform)?.color||"#888"}"></div>ADD LINE → ${modal.platform}</div><div class="modal-field"><label class="modal-label">Line ID</label><input id="l-id" class="modal-input" value="${modal.id}" onkeydown="if(event.key==='Enter')sAL()"></div><div class="modal-row"><div class="modal-field"><label class="modal-label">Currency</label><select id="l-cur" class="modal-input sm">${["INR","USDT","SOL","ETH","BTC","USD"].map(c=>`<option ${c===modal.currency?"selected":""}>${c}</option>`).join("")}</select></div><div class="modal-field"><label class="modal-label">Notes</label><input id="l-notes" class="modal-input sm" placeholder="Optional..." value="${modal.notes}"></div></div><div class="modal-actions"><button class="btn btn-green" onclick="sAL()">ADD LINE</button><button class="btn" onclick="cM()">CANCEL</button></div>`;
    if(modal.t==="el"){const l=L.find(x=>x.id===modal.id),pl=gP(l.platform);h+=`<div class="modal-title"><div class="modal-title-dot" style="background:${pl?.color||"#888"}"></div>EDIT → ${l.id}</div><div class="modal-field"><label class="modal-label">Balance</label><input type="number" id="eb" class="modal-input" value="${l.balance}" step="any" onkeydown="if(event.key==='Enter')sEL()"></div><div class="modal-row"><div class="modal-field"><label class="modal-label">Deposited</label><input type="number" id="ed" class="modal-input" value="${l.deposit}" step="any"><div class="modal-hint">For P&amp;L calculation</div></div><div class="modal-field"><label class="modal-label">Currency</label><select id="ec" class="modal-input sm">${["INR","USDT","SOL","ETH","BTC","USD"].map(c=>`<option ${c===l.currency?"selected":""}>${c}</option>`).join("")}</select></div></div><div class="modal-field"><label class="modal-label">Notes</label><input id="en" class="modal-input sm" value="${l.notes}" placeholder="Notes..." onkeydown="if(event.key==='Enter')sEL()"></div><div class="modal-actions"><button class="btn btn-green" onclick="sEL()">SAVE</button><button class="btn" onclick="cM()">CANCEL</button></div>`}
    h+=`</div></div>`;
  }

  h+=`<div class="bottom-nav"><div class="bottom-nav-inner">
    <button class="bnav-btn ${aM==="all"?"active":""}" onclick="sM('all')"><span class="bnav-icon">🗂️</span>ALL</button>
    ${M.slice(0,4).map(m=>`<button class="bnav-btn ${aM===m.id?"active":""}" onclick="sM('${m.id}')"><span class="bnav-icon">${m.icon}</span>${m.name.substring(0,4).toUpperCase()}</button>`).join("")}
    <button class="bnav-btn" onclick="sMM()"><span class="bnav-icon">⋯</span>MORE</button>
  </div></div>`;

  h+=`<div class="footer"><span>TFM v4.0</span><span>${L.length} LINES · ${P.length} PLATFORMS · ${M.length} MODULES</span></div>`;

  document.getElementById("app").innerHTML=h;
  uC();
}

function sMM(){
  const e=document.createElement("div");e.className="modal-overlay";e.onclick=ev=>{if(ev.target===e)e.remove()};
  e.innerHTML=`<div class="modal"><div class="modal-title">⋯ ACTIONS</div><div style="display:flex;flex-direction:column;gap:6px">
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();oAM()">+ ADD MODULE</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();oAP()">+ ADD PLATFORM</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();tV()">${vw==="grid"?"≡ TABLE":"⊞ GRID"}</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();imp()">↑ IMPORT</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();exp()">↓ EXPORT</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();tL()">📋 LOG</button>
    ${M.length>4?M.slice(4).map(m=>`<button class="btn" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();sM('${m.id}')">${m.icon} ${m.name}</button>`).join(""):""}
    <button class="btn btn-danger" style="width:100%;padding:14px;font-size:12px" onclick="this.closest('.modal-overlay').remove();resetAll()">⚠ RESET</button>
    <button class="btn" style="width:100%;padding:14px;font-size:12px;margin-top:4px" onclick="this.closest('.modal-overlay').remove()">CLOSE</button>
  </div></div>`;
  document.body.appendChild(e);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
ld();R();setInterval(uC,1000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
